<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invite</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#ffdde1);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

.card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.1);
  padding:30px;
  border-radius:25px;
  text-align:center;
  width:90%;
  max-width:400px;
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
  animation: fadeIn 1.5s ease;
}

h1 {
  font-size:28px;
}

.timer {
  font-size:26px;
  margin-top:15px;
  font-weight:bold;
}

button {
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:white;
  color:#ff6a88;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform:scale(1.05);
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(30px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">
  <h1 id="names">💍</h1>
  <p id="date"></p>
  <p id="message"></p>
  <div class="timer" id="timer"></div>

  <button onclick="rsvp()">Я приду ❤️</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// 🔗 ВСТАВЬ СВОЙ BACKEND
const API = "https://YOUR_BACKEND_URL";

fetch(`${API}/invite/${id}`)
.then(res => res.json())
.then(data => {
  document.getElementById("names").innerText = data.name1 + " & " + data.name2;
  document.getElementById("date").innerText = "📅 " + data.date;
  document.getElementById("message").innerText = data.message;

  startTimer(data.date);
});

function startTimer(dateStr) {
  const target = new Date(dateStr);

  setInterval(() => {
    const now = new Date();
    const diff = target - now;

    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor(diff / (1000*60*60)%24);
    const m = Math.floor(diff / (1000*60)%60);

    document.getElementById("timer").innerText =
      `${d} дн ${h} ч ${m} мин`;
  }, 1000);
}

// 🎉 CONFETTI
function confetti() {
  for (let i = 0; i < 30; i++) {
    let el = document.createElement("div");
    el.style.position = "fixed";
    el.style.width = "8px";
    el.style.height = "8px";
    el.style.background = "white";
    el.style.top = Math.random()*100+"%";
    el.style.left = Math.random()*100+"%";
    el.style.opacity = 0.7;
    el.style.borderRadius = "50%";
    el.style.animation = "fall 2s linear";
    document.body.appendChild(el);

    setTimeout(()=>el.remove(),2000);
  }
}

function rsvp() {
  confetti();
  alert("Спасибо! Ждём вас ❤️");
}

// анимация падения
const style = document.createElement('style');
style.innerHTML = `
@keyframes fall {
  to {
    transform: translateY(100px);
    opacity: 0;
  }
}`;
document.head.appendChild(style);
</script>

</body>
</html>
